# AWS Amplify build settings for the frontend (monorepo — app lives in client/).
# Amplify reads this automatically when you connect the repo.
version: 1
applications:
  - appRoot: client
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
